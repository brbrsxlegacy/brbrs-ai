<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>brbrs AI</title>
<style>
body{background:#050510;color:white;font-family:Arial;margin:0}
h1{text-align:center;color:#00ffe5;text-shadow:0 0 20px #00ffe5}
#chat{height:75vh;overflow-y:auto;padding:20px}
.msg{padding:15px;margin:10px;border-radius:15px;background:#111122;box-shadow:0 0 10px #00ffe5}
.user{border-left:5px solid #00ffe5}
.ai{border-left:5px solid magenta}
.bar{position:fixed;bottom:0;width:100%;display:flex;padding:10px;background:#111}
input{flex:1;padding:15px;font-size:18px;border:none;border-radius:10px}
button{margin-left:10px;padding:15px;border:none;border-radius:10px;background:#00ffe5;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<h1>brbrs AI</h1>
<div id="chat"></div>

<div class="bar">
<input id="input" placeholder="Mesaj yaz...">
<button onclick="sendMessage()">Gönder</button>
</div>

<script>
const input = document.getElementById("input");
const chat = document.getElementById("chat");

input.addEventListener("keydown", e => {
  if(e.key === "Enter") sendMessage();
});

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  chat.innerHTML += `<div class="msg user"><b>Sen:</b><br>${text}</div>`;
  input.value = "";

  chat.innerHTML += `<div class="msg ai"><b>brbrs AI:</b><br>Yazıyor...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try{
    const response = await fetch("https://senin-site.onrender.com/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await response.json();

    const aiMessages = document.querySelectorAll(".ai");
    aiMessages[aiMessages.length - 1].innerHTML =
      `<b>brbrs AI:</b><br>${data.reply}`;
  }catch{
    const aiMessages = document.querySelectorAll(".ai");
    aiMessages[aiMessages.length - 1].innerHTML =
      `<b>brbrs AI:</b><br>Sunucu kapalı kanka. CMD'de node server.js çalıştır.`;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
