<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brbrs AI</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:linear-gradient(135deg,#03030a,#0b0b25,#050510);
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,#00ffe533,transparent 25%),
    radial-gradient(circle at 80% 10%,#ff00ff33,transparent 25%),
    radial-gradient(circle at 50% 90%,#0088ff33,transparent 25%);
  pointer-events:none;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
}

header{
  padding:18px;
  text-align:center;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(16px);
  border-bottom:1px solid #00ffe555;
}

h1{
  margin:0;
  color:#00ffe5;
  text-shadow:0 0 20px #00ffe5;
  letter-spacing:2px;
}

.sub{
  font-size:13px;
  opacity:.8;
  margin-top:5px;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.row{
  display:flex;
  align-items:flex-end;
  gap:10px;
  animation:pop .2s ease;
}

.row.userRow{
  justify-content:flex-end;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  box-shadow:0 0 15px #00ffe5;
}

.aiAvatar{
  background:#111122;
  color:#00ffe5;
}

.userAvatar{
  background:#00ffe5;
  color:black;
}

.msg{
  padding:14px 16px;
  max-width:70%;
  border-radius:20px;
  line-height:1.4;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.user{
  background:linear-gradient(135deg,#00ffe5,#0088ff);
  color:black;
  border-bottom-right-radius:5px;
  box-shadow:0 0 18px #00ffe5;
}

.ai{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-bottom-left-radius:5px;
  box-shadow:0 0 18px #ff00ff88;
}

.time{
  font-size:11px;
  opacity:.65;
  margin-top:6px;
}

.bar{
  display:flex;
  gap:10px;
  padding:15px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(18px);
  border-top:1px solid #00ffe544;
}

textarea{
  flex:1;
  resize:none;
  height:52px;
  max-height:120px;
  padding:15px;
  border:none;
  outline:none;
  border-radius:18px;
  background:#111122;
  color:white;
  font-size:16px;
  box-shadow:0 0 12px #00ffe555;
}

button{
  padding:0 22px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#00ffe5,#0088ff);
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00ffe5;
}

.typing span{
  display:inline-block;
  animation:bounce 1s infinite;
}

.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}

@keyframes bounce{
  0%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-6px)}
}

@keyframes pop{
  from{opacity:0;transform:scale(.92)}
  to{opacity:1;transform:scale(1)}
}

@media(max-width:600px){
  .msg{max-width:85%}
  button{padding:0 16px}
}
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>brbrs AI</h1>
    <div class="sub">Neon sohbet asistanı</div>
  </header>

  <div id="chat"></div>

  <div class="bar">
    <textarea id="input" placeholder="Mesaj yaz..."></textarea>
    <button onclick="sendMessage()">Gönder</button>
  </div>
</div>

<script>
const input = document.getElementById("input");
const chat = document.getElementById("chat");

input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

function saat(){
  return new Date().toLocaleTimeString("tr-TR", {
    hour:"2-digit",
    minute:"2-digit"
  });
}

function addMessage(text, type, loading=false){
  const row = document.createElement("div");
  row.className = "row " + (type === "user" ? "userRow" : "aiRow");

  const avatar = document.createElement("div");
  avatar.className = "avatar " + (type === "user" ? "userAvatar" : "aiAvatar");
  avatar.textContent = type === "user" ? "S" : "AI";

  const bubble = document.createElement("div");
  bubble.className = "msg " + type;

  if(loading){
    bubble.innerHTML = `
      <b>brbrs AI düşünüyor</b>
      <div class="typing"><span>.</span><span>.</span><span>.</span></div>
    `;
  }else{
    bubble.innerHTML = `
      ${text}
      <div class="time">${saat()}</div>
    `;
  }

  if(type === "user"){
    row.appendChild(bubble);
    row.appendChild(avatar);
  }else{
    row.appendChild(avatar);
    row.appendChild(bubble);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  const loadingBubble = addMessage("", "ai", true);

  try{
    const response = await fetch("http://localhost:3000/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await response.json();

    loadingBubble.innerHTML = `
      ${data.reply}
      <div class="time">${saat()}</div>
    `;
  }catch{
    loadingBubble.innerHTML = `
      Sunucu kapalı kanka. Render linkini veya node server.js'i kontrol et.
      <div class="time">${saat()}</div>
    `;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
