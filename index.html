<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brbrs AI</title>
<style>
*{box-sizing:border-box}
body{
  background: radial-gradient(circle at top,#11113a,#050510 60%);
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
}
.app{
  max-width:900px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}
h1{
  text-align:center;
  color:#00ffe5;
  text-shadow:0 0 20px #00ffe5,0 0 45px #00ffe5;
  margin:18px 0 8px;
}
.small{
  text-align:center;
  color:#9ff;
  opacity:.8;
  margin-bottom:10px;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px;
  padding-bottom:95px;
}
.msg{
padding:15px;
margin:10px;
border-radius:15px;
background:#111122;
box-shadow:0 0 10px #00ffe5;
max-width:70%;
width:fit-content;
}

.user{
border-left:5px solid #00ffe5;
margin-left:auto;
text-align:right;
}

.ai{
border-left:5px solid magenta;
margin-right:auto;
}
.bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#090914;
  padding:12px;
  display:flex;
  gap:10px;
  box-shadow:0 -4px 18px rgba(0,255,229,.25);
}
.inner{
  max-width:900px;
  margin:auto;
  display:flex;
  gap:10px;
  width:100%;
}
input{
  flex:1;
  padding:15px;
  font-size:17px;
  border:none;
  outline:none;
  border-radius:14px;
  background:#17172b;
  color:white;
  box-shadow:0 0 10px rgba(0,255,229,.35);
}
button{
  padding:15px 20px;
  border:none;
  border-radius:14px;
  background:#00ffe5;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 18px #00ffe5;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
</style>
</head>
<body>
<div class="app">
  <h1>brbrs AI</h1>
  <div class="small">Groq API ile çalışan neon sohbet botu</div>

  <div id="chat">
    <div class="msg ai"><b>brbrs AI:</b><br>Selam kanka 😎 Mesaj yaz, Enter’a bas.</div>
  </div>
</div>

<div class="bar">
  <div class="inner">
    <input id="input" placeholder="Mesaj yaz...">
    <button id="sendBtn" onclick="sendMessage()">Gönder</button>
  </div>
</div>

<script>
const input = document.getElementById("input");
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

input.addEventListener("keydown", e => {
  if(e.key === "Enter") sendMessage();
});

function escapeHTML(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text || sendBtn.disabled) return;

  chat.innerHTML += `<div class="msg user"><b>Sen:</b><br>${escapeHTML(text)}</div>`;
  input.value = "";
  sendBtn.disabled = true;

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerHTML = "<b>brbrs AI:</b><br>Yazıyor...";
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try{
    const response = await fetch("https://senin-site.onrender.com/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await response.json();
    loading.innerHTML = `<b>brbrs AI:</b><br>${escapeHTML(data.reply || "Cevap gelmedi.")}`;
  }catch(err){
    loading.innerHTML = "<b>brbrs AI:</b><br>Sunucu kapalı kanka. CMD'de npm start çalıştır.";
  }

  sendBtn.disabled = false;
  input.focus();
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
